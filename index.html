<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel Data Siswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero {
            background-image: url("https://cdn.antaranews.com/cache/1200x800/2022/06/20/Logo-Baru-Free-Fire.jpg");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
        }
        .overlay {
            background-color: rgba(0, 0, 0, 0.5);
            min-height: 100vh;
        }
    </style>
</head>
<body class="bg-light">
    <div class="hero">
        <div class="overlay d-flex justify-content-center align-items-center text-center">
            <div class="text-white">
                <h1 class="display-5 fw-bold">Selamat Datang!</h1>
                <p class="fs-4">Belajar Bootstrap jadi mudah dan menyenangkan.</p>
                <button class="btn btn-primary btn-lg">Mulai</button>
                <button class="btn btn-outline-light">Panduan</button>
            </div>
        </div>
    </div>

    <div class="container my-5">
        <h2 class="text-center mb-4">Tabel Data Siswa</h2>
        <p class="text-center">Contoh penggunaan Tabel,Gambar,dan Button Bootstrap</p>
        <div class="img-thumbnail">
            <table class="table table-striped table-bordered table-hover align-middle text-center">
            <thead class="align-middle text-center">
                <tr class="table-dark">
                    <th>No</th>
                    <th>Foto</th>
                    <th>Nama</th>
                    <th>NIS</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSy9agjoQWAFnEA8tnR6YiN8Zju6n30rilZB9lLoV3Jy91TFoYDPrLoE-I&s=10" class="rounded-circle img-fluid" style="max-width: 80px;"></td>
                    <td class="editb">bahlil prime</td>
                    <td class="editb">123456789</td>
                    <td><span class="badge bg-success">Aktif</span></td>
                    <td>
                        <button class="btn btn-warning btn-sm edit-btn">Edit</button>
                        <button class="btn btn-danger btn-sm delete-btn">Hapus</button>
                    </td>
                </tr>
                <tr>
                    <td>2</td>
                    <td><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTINwAmrGY6m0pruIX6pwPU5e_jbZMfXN_-AZpJSjbRgg&s=10" class="rounded-circle img-fluid" style="max-width: 80px;"></td>
                    <td class="editb">bahlil empire</td>
                    <td class="editb">987654321</td>
                    <td><span class="badge bg-warning">Izin</span></td>
                    <td>
                        <button class="btn btn-warning btn-sm edit-btn">Edit</button>
                        <button class="btn btn-danger btn-sm delete-btn">Hapus</button>
                    </td>
                </tr>
                <tr>
                    <td>3</td>
                    <td><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJcuSbT2kkUWsLSD0lqlZXa0eaz6Y5qz0Vk-adxy6Y4Q&s=10" class="rounded-circle img-fluid" style="max-width: 80px;"></td>
                    <td class="editb">bahlil sopan</td>
                    <td class="editb">192837465</td>
                    <td><span class="badge bg-danger">Alfa</span></td>
                    <td>
                        <button class="btn btn-warning btn-sm edit-btn">Edit</button>
                        <button class="btn btn-danger btn-sm delete-btn">Hapus</button>
                    </td>
                </tr>
            </tbody>
        </table>
        </div>
        
        <br>
        <div class="text-center">
        <button class="btn btn-primary">simpan</button>
        <button class="btn btn-outline-info">Detail</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                this.closest('tr').remove();
            });
        });

        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const row = this.closest('tr');
                const editbs = row.querySelectorAll('.editb');
                
                if (this.textContent === 'Edit') {
                    editbs.forEach(cell => cell.contentEditable = true);
                    this.textContent = 'Save';
                    this.classList.replace('btn-warning', 'btn-success');
                } else {
                    editbs.forEach(cell => cell.contentEditable = false);
                    this.textContent = 'Edit';
                    this.classList.replace('btn-success', 'btn-warning');
                }
            });
        });
    </script>
</body>
